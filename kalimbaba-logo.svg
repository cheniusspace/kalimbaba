<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C97B3A"/>
      <stop offset="60%" stop-color="#8B4513"/>
      <stop offset="100%" stop-color="#4A1F06"/>
    </linearGradient>
    <linearGradient id="woodGrad" x1="0%" y1="0%" x2="10%" y2="100%">
      <stop offset="0%" stop-color="#F0DDB8"/>
      <stop offset="100%" stop-color="#C8A06A"/>
    </linearGradient>
    <linearGradient id="tineGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF5DC"/>
      <stop offset="100%" stop-color="#D4B87A"/>
    </linearGradient>
    <radialGradient id="holeGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1A0800"/>
      <stop offset="100%" stop-color="#3D1A05"/>
    </radialGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="bodyShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#2A0E00" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="500" height="500" rx="90" fill="url(#bgGrad)"/>

  <!-- Subtle warm highlight top-left -->
  <ellipse cx="140" cy="130" rx="180" ry="140" fill="rgba(255,200,100,0.07)"/>

  <!-- Kalimba wooden body -->
  <rect x="105" y="268" width="290" height="175" rx="32" fill="url(#woodGrad)" filter="url(#bodyShadow)"/>

  <!-- Wood grain lines (subtle) -->
  <line x1="115" y1="310" x2="385" y2="310" stroke="rgba(160,100,40,0.18)" stroke-width="1.5"/>
  <line x1="115" y1="330" x2="385" y2="330" stroke="rgba(160,100,40,0.12)" stroke-width="1"/>
  <line x1="115" y1="352" x2="385" y2="352" stroke="rgba(160,100,40,0.14)" stroke-width="1.2"/>
  <line x1="115" y1="372" x2="385" y2="372" stroke="rgba(160,100,40,0.10)" stroke-width="1"/>

  <!-- Sound hole -->
  <circle cx="250" cy="365" r="42" fill="url(#holeGrad)"/>
  <circle cx="250" cy="365" r="36" fill="#100400"/>
  <!-- Sound hole inner ring highlight -->
  <circle cx="250" cy="365" r="42" fill="none" stroke="rgba(200,140,60,0.4)" stroke-width="2.5"/>

  <!-- Bridge bar (nut) -->
  <rect x="110" y="278" width="280" height="18" rx="9" fill="#B8864E"/>
  <!-- Bridge highlight -->
  <rect x="112" y="279" width="276" height="7" rx="4" fill="rgba(255,235,180,0.25)"/>
  <!-- Bridge shadow line -->
  <line x1="112" y1="295" x2="388" y2="295" stroke="rgba(80,35,5,0.3)" stroke-width="1.5"/>

  <!-- === TINES (9 tines, center tallest, alternating) === -->
  <!-- Bridge top at y=278. Tine bottoms sit at y=278. -->
  <!-- Tine heights: center=128, ±1=112, ±2=97, ±3=82, ±4=67 -->
  <!-- Tine centers: 146, 172, 198, 224, 250, 276, 302, 328, 354 -->
  <!-- Tine widths: 15 (center), 14, 13, 12, 11 -->

  <!-- Outer tines (±4) — shortest -->
  <rect x="140" y="211" width="11" height="67" rx="4" fill="url(#tineGrad)" opacity="0.85"/>
  <rect x="349" y="211" width="11" height="67" rx="4" fill="url(#tineGrad)" opacity="0.85"/>

  <!-- 3rd tines (±3) -->
  <rect x="165" y="196" width="12" height="82" rx="4" fill="url(#tineGrad)" opacity="0.90"/>
  <rect x="323" y="196" width="12" height="82" rx="4" fill="url(#tineGrad)" opacity="0.90"/>

  <!-- 2nd tines (±2) -->
  <rect x="191" y="181" width="13" height="97" rx="5" fill="url(#tineGrad)" opacity="0.95"/>
  <rect x="296" y="181" width="13" height="97" rx="5" fill="url(#tineGrad)" opacity="0.95"/>

  <!-- 1st tines (±1) -->
  <rect x="217" y="166" width="14" height="112" rx="5" fill="url(#tineGrad)"/>
  <rect x="269" y="166" width="14" height="112" rx="5" fill="url(#tineGrad)"/>

  <!-- Center tine (tallest) -->
  <rect x="242" y="150" width="15" height="128" rx="5" fill="url(#tineGrad)" filter="url(#softGlow)"/>

  <!-- Tine tip highlights (rounded glints) -->
  <ellipse cx="146" cy="213" rx="3.5" ry="2.5" fill="rgba(255,250,220,0.7)"/>
  <ellipse cx="355" cy="213" rx="3.5" ry="2.5" fill="rgba(255,250,220,0.7)"/>
  <ellipse cx="171" cy="198" rx="4" ry="2.5" fill="rgba(255,250,220,0.75)"/>
  <ellipse cx="329" cy="198" rx="4" ry="2.5" fill="rgba(255,250,220,0.75)"/>
  <ellipse cx="197" cy="183" rx="4.5" ry="2.5" fill="rgba(255,250,220,0.80)"/>
  <ellipse cx="302" cy="183" rx="4.5" ry="2.5" fill="rgba(255,250,220,0.80)"/>
  <ellipse cx="224" cy="168" rx="5" ry="3" fill="rgba(255,250,220,0.85)"/>
  <ellipse cx="276" cy="168" rx="5" ry="3" fill="rgba(255,250,220,0.85)"/>
  <ellipse cx="250" cy="152" rx="5.5" ry="3" fill="rgba(255,255,230,0.90)"/>

  <!-- Small dot decorations on body sides -->
  <circle cx="135" cy="355" r="4" fill="rgba(160,100,40,0.35)"/>
  <circle cx="365" cy="355" r="4" fill="rgba(160,100,40,0.35)"/>
</svg>
